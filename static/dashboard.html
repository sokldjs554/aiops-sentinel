<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIOps Sentinel — 이상탐지 대시보드</title>
<style>
  :root{
    color-scheme: dark;
    --page:#0d0d0d; --surface:#1a1a19;
    --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10);
    --series:#3987e5; --critical:#d03b3b; --good:#0ca30c;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--page);color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px}
  header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
  header h1{font-size:20px;font-weight:700}
  header .sub{color:var(--muted);font-size:13px}
  .layout{display:grid;grid-template-columns:1fr 340px;gap:16px;max-width:1280px;margin:0 auto}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;grid-column:1/-1}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .tile .label{color:var(--muted);font-size:12px;margin-bottom:4px}
  .tile .value{font-size:26px;font-weight:700}
  .tile .value small{font-size:13px;font-weight:400;color:var(--ink-2);margin-left:2px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
  .card h2{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:8px}
  .charts{display:flex;flex-direction:column;gap:14px}
  .chart-wrap{position:relative}
  svg{display:block;width:100%}
  .tooltip{position:absolute;pointer-events:none;background:var(--page);border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;font-size:12px;color:var(--ink-2);display:none;z-index:5;white-space:nowrap}
  .tooltip b{color:var(--ink)}
  .anom-note{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:2px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--critical);
    box-shadow:0 0 0 2px var(--surface);display:inline-block}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{color:var(--muted);text-align:left;font-weight:500;padding:6px 4px;border-bottom:1px solid var(--baseline)}
  td{padding:7px 4px;border-bottom:1px solid var(--grid);color:var(--ink-2);
    font-variant-numeric:tabular-nums}
  td:first-child{color:var(--ink)}
  .badge{color:var(--critical);font-weight:600}
  /* chat */
  .chat{display:flex;flex-direction:column;height:520px}
  .chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
  .msg{max-width:92%;padding:9px 12px;border-radius:10px;font-size:13px;white-space:pre-wrap}
  .msg.user{align-self:flex-end;background:var(--series);color:#fff}
  .msg.bot{align-self:flex-start;background:var(--page);border:1px solid var(--border);color:var(--ink-2)}
  .msg.bot .engine{display:block;margin-top:6px;font-size:11px;color:var(--muted)}
  .chat-input{display:flex;gap:8px;margin-top:12px}
  .chat-input input{flex:1;background:var(--page);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--ink);font-size:13px;outline:none}
  .chat-input input:focus{border-color:var(--series)}
  .chat-input button{background:var(--series);border:0;border-radius:8px;color:#fff;
    padding:0 16px;font-size:13px;font-weight:600;cursor:pointer}
  .suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .suggestions button{background:none;border:1px solid var(--border);border-radius:99px;
    color:var(--ink-2);font-size:11.5px;padding:4px 10px;cursor:pointer}
  .suggestions button:hover{border-color:var(--series);color:var(--ink)}
</style>
</head>
<body>
<header>
  <h1>AIOps Sentinel</h1>
  <span class="sub">로그 이상탐지 · IsolationForest + AI 운영 어시스턴트</span>
</header>

<div class="layout">
  <div class="kpis" id="kpis"></div>

  <div class="card charts">
    <div class="chart-wrap"><h2>분당 요청 수 <span style="color:var(--muted);font-weight:400">req/min</span></h2>
      <svg id="c-req" height="130"></svg><div class="tooltip" id="tt-req"></div></div>
    <div class="chart-wrap"><h2>5xx 에러율 <span style="color:var(--muted);font-weight:400">%</span></h2>
      <svg id="c-err" height="130"></svg><div class="tooltip" id="tt-err"></div></div>
    <div class="chart-wrap"><h2>평균 응답시간 <span style="color:var(--muted);font-weight:400">ms</span></h2>
      <svg id="c-lat" height="130"></svg><div class="tooltip" id="tt-lat"></div></div>
    <div class="anom-note"><span class="dot"></span> 표시점 = 모델이 탐지한 이상 구간 (▲ 이상)</div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="card chat">
      <h2>AI 운영 어시스턴트</h2>
      <div class="chat-log" id="chat-log">
        <div class="msg bot">안녕하세요! 탐지된 이상에 대해 질문해 보세요.</div>
      </div>
      <div class="suggestions">
        <button onclick="ask('현재 상태 요약해줘')">상태 요약</button>
        <button onclick="ask('가장 심각한 이상은 언제야?')">가장 심각한 이상</button>
        <button onclick="ask('이상 원인 분석해줘')">원인 분석</button>
      </div>
      <div class="chat-input">
        <input id="q" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">전송</button>
      </div>
    </div>
  </div>

  <div class="card" style="grid-column:1/-1">
    <h2>탐지된 이상 Top 12</h2>
    <table id="anom-table">
      <thead><tr><th>시각</th><th>이상 점수</th><th>추정 원인</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
let TL = null;

function fmtTs(iso){ const d=new Date(iso); return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function drawLine(svgId, ttId, values, anomFlags, unit){
  const svg = document.getElementById(svgId);
  const W = svg.clientWidth || 800, H = +svg.getAttribute('height');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const padL = 44, padR = 8, padT = 8, padB = 18;
  const iw = W-padL-padR, ih = H-padT-padB;
  const max = Math.max(...values)*1.08 || 1, min = 0;
  const x = i => padL + i/(values.length-1)*iw;
  const y = v => padT + ih - (v-min)/(max-min)*ih;
  let g = '';
  // gridlines (recessive) + y labels
  for(let t=0;t<=3;t++){
    const v = min + (max-min)*t/3, yy = y(v);
    g += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="${css('--grid')}" stroke-width="1"/>`;
    g += `<text x="${padL-6}" y="${yy+4}" fill="${css('--muted')}" font-size="10" text-anchor="end">${v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(v<10?1:0)}</text>`;
  }
  // baseline
  g += `<line x1="${padL}" y1="${padT+ih}" x2="${W-padR}" y2="${padT+ih}" stroke="${css('--baseline')}" stroke-width="1"/>`;
  // x labels (sparse)
  const step = Math.floor(values.length/6);
  for(let i=0;i<values.length;i+=step)
    g += `<text x="${x(i)}" y="${H-4}" fill="${css('--muted')}" font-size="10" text-anchor="middle">${fmtTs(TL.ts[i])}</text>`;
  // series line (2px)
  const pts = values.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  g += `<polyline points="${pts}" fill="none" stroke="${css('--series')}" stroke-width="2" stroke-linejoin="round"/>`;
  // anomaly markers: critical color, 2px surface ring, ≥8px
  anomFlags.forEach((f,i)=>{ if(f) g += `<circle cx="${x(i)}" cy="${y(values[i])}" r="4.5" fill="${css('--critical')}" stroke="${css('--surface')}" stroke-width="2"/>`; });
  // crosshair + capture rect
  g += `<line id="${svgId}-ch" x1="0" y1="${padT}" x2="0" y2="${padT+ih}" stroke="${css('--muted')}" stroke-width="1" opacity="0"/>`;
  g += `<rect x="${padL}" y="${padT}" width="${iw}" height="${ih}" fill="transparent"/>`;
  svg.innerHTML = g;
  const tt = document.getElementById(ttId), ch = document.getElementById(`${svgId}-ch`);
  svg.onmousemove = e => {
    const r = svg.getBoundingClientRect();
    const mx = (e.clientX-r.left)*(W/r.width);
    const i = Math.max(0, Math.min(values.length-1, Math.round((mx-padL)/iw*(values.length-1))));
    ch.setAttribute('x1',x(i)); ch.setAttribute('x2',x(i)); ch.setAttribute('opacity','0.5');
    tt.style.display='block';
    tt.innerHTML = `<b>${fmtTs(TL.ts[i])}</b><br>${values[i].toLocaleString()} ${unit}` + (anomFlags[i]?`<br><span style="color:${css('--critical')}">▲ 이상 탐지 (score ${TL.anomaly_score[i]})</span>`:'');
    const left = Math.min(x(i)/W*r.width+12, r.width-160);
    tt.style.left = left+'px'; tt.style.top = '28px';
  };
  svg.onmouseleave = () => { tt.style.display='none'; ch.setAttribute('opacity','0'); };
}

async function load(){
  const [sum, tl, an] = await Promise.all([
    fetch('/api/summary').then(r=>r.json()),
    fetch('/api/timeline').then(r=>r.json()),
    fetch('/api/anomalies').then(r=>r.json()),
  ]);
  TL = tl;
  const m = sum.metrics.minute_level||{}, ev = sum.metrics.event_level||{};
  document.getElementById('kpis').innerHTML = `
    <div class="tile"><div class="label">분석 구간</div><div class="value">${sum.total_minutes.toLocaleString()}<small>분</small></div></div>
    <div class="tile"><div class="label">탐지된 이상</div><div class="value">${sum.anomaly_minutes}<small>분</small></div></div>
    <div class="tile"><div class="label">이벤트 탐지율</div><div class="value">${ev.detection_rate!=null?(ev.detection_rate*100).toFixed(0):'–'}<small>% (${ev.detected}/${ev.total})</small></div></div>
    <div class="tile"><div class="label">분 단위 F1</div><div class="value">${m.f1!=null?m.f1.toFixed(2):'–'}</div></div>`;
  drawLine('c-req','tt-req',tl.req_count,tl.is_anomaly,'req/min');
  drawLine('c-err','tt-err',tl.error_rate,tl.is_anomaly,'%');
  drawLine('c-lat','tt-lat',tl.latency_avg,tl.is_anomaly,'ms');
  document.querySelector('#anom-table tbody').innerHTML = an.map(a=>
    `<tr><td>${fmtTs(a.ts)}</td><td><span class="badge">▲ ${a.score.toFixed(3)}</span></td><td>${a.cause}</td></tr>`).join('');
}

function ask(q){ document.getElementById('q').value=q; send(); }
async function send(){
  const inp = document.getElementById('q'), log = document.getElementById('chat-log');
  const q = inp.value.trim(); if(!q) return;
  inp.value='';
  log.insertAdjacentHTML('beforeend', `<div class="msg user"></div>`);
  log.lastElementChild.textContent = q;
  log.scrollTop = log.scrollHeight;
  const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
  const d = await r.json();
  log.insertAdjacentHTML('beforeend', `<div class="msg bot"></div>`);
  const el = log.lastElementChild;
  el.textContent = d.answer;
  el.insertAdjacentHTML('beforeend', `<span class="engine">engine: ${d.engine}</span>`);
  log.scrollTop = log.scrollHeight;
}
load();
window.addEventListener('resize', ()=>{ if(TL){ drawLine('c-req','tt-req',TL.req_count,TL.is_anomaly,'req/min'); drawLine('c-err','tt-err',TL.error_rate,TL.is_anomaly,'%'); drawLine('c-lat','tt-lat',TL.latency_avg,TL.is_anomaly,'ms'); }});
</script>
</body>
</html>
